name: Build and Release

on:
  schedule:
    - cron: '0 4 * * *'   # once a day (04:00 UTC); only builds if main has new commits
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Decide whether a build is needed. Manual runs and tag pushes always build;
  # the daily scheduled run only builds when main has moved since the last
  # 'latest' release, so we get at most one rolling build per day.
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_build: ${{ steps.decide.outputs.should_build }}
    steps:
      - name: Decide whether to build
        id: decide
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Event '${{ github.event_name }}' -> always build."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          head="${{ github.sha }}"
          last="$(gh api "repos/${{ github.repository }}/git/ref/tags/latest" \
                   --jq '.object.sha' 2>/dev/null || echo '')"
          echo "current HEAD: $head"
          echo "latest build: ${last:-<none>}"
          if [ "$head" != "$last" ]; then
            echo "New commits since the last build -> building."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "No new commits since the last build -> skipping."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download BASS libraries
        shell: pwsh
        run: |
          $libs = @(
            @{ name = "bass";    url = "https://www.un4seen.com/files/bass24.zip" },
            @{ name = "bass_fx"; url = "https://www.un4seen.com/files/z/0/bass_fx24.zip" },
            @{ name = "bassenc"; url = "https://www.un4seen.com/files/bassenc24.zip" }
          )
          foreach ($lib in $libs) {
            Invoke-WebRequest -Uri $lib.url -OutFile "$($lib.name).zip" -UserAgent "Mozilla/5.0"
            Expand-Archive -Path "$($lib.name).zip" -DestinationPath "$($lib.name)" -Force
          }

      - name: Copy headers, libs and DLLs
        shell: pwsh
        run: |
          # bass
          Copy-Item bass\c\bass.h         -Destination .
          Copy-Item bass\c\x64\bass.lib   -Destination .
          Copy-Item bass\x64\bass.dll     -Destination .

          # bass_fx
          Copy-Item bass_fx\c\bass_fx.h        -Destination .
          Copy-Item bass_fx\c\x64\bass_fx.lib  -Destination .
          Copy-Item bass_fx\x64\bass_fx.dll    -Destination .

          # bassenc
          Copy-Item bassenc\c\bassenc.h        -Destination .
          Copy-Item bassenc\c\x64\bassenc.lib  -Destination .
          Copy-Item bassenc\x64\bassenc.dll    -Destination .

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build
        shell: cmd
        run: build.bat

      - name: Render README to HTML
        shell: pwsh
        run: |
          $body = (ConvertFrom-Markdown -Path README.md).Html
          $html = @"
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>BASS PlAIer</title>
          <style>
            body { font-family: system-ui, sans-serif; line-height: 1.6;
                   max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
            code { background: #f0f0f0; padding: .1em .3em; border-radius: 3px; }
            pre { background: #f0f0f0; padding: 1rem; border-radius: 6px; overflow-x: auto; }
            pre code { background: none; padding: 0; }
            table { border-collapse: collapse; }
            th, td { border: 1px solid #ccc; padding: .3em .6em; text-align: left; }
            blockquote { border-left: 4px solid #ccc; margin: 1em 0; padding: .1em 1em; color: #555; }
          </style>
          </head>
          <body>
          $body
          </body>
          </html>
          "@
          Set-Content -Path README.html -Value $html -Encoding utf8

      - name: Stage and zip release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release | Out-Null
          Copy-Item BASSPlAIer.exe, bass.dll, bass_fx.dll, bassenc.dll, README.html -Destination release\
          if ($env:GITHUB_REF_TYPE -eq 'tag') {
            $zip = "BASSPlAIer-$env:GITHUB_REF_NAME-x64.zip"
          } else {
            $zip = "BASSPlAIer-x64.zip"
          }
          Compress-Archive -Path release\* -DestinationPath $zip
          "ZIP_NAME=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: BASSPlAIer-x64
          path: ${{ env.ZIP_NAME }}

      # --- Rolling "latest" prerelease on every push to main ---
      - name: Delete previous latest release
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: gh release delete latest --cleanup-tag --yes || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish latest (rolling prerelease)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Development Build
          prerelease: true
          files: ${{ env.ZIP_NAME }}

      # --- Proper release when a v* tag is pushed ---
      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
