name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download BASS libraries
        shell: pwsh
        run: |
          $libs = @(
            @{ name = "bass";    url = "https://www.un4seen.com/files/bass24.zip" },
            @{ name = "bass_fx"; url = "https://www.un4seen.com/files/z/0/bass_fx24.zip" },
            @{ name = "bassenc"; url = "https://www.un4seen.com/files/bassenc24.zip" }
          )
          foreach ($lib in $libs) {
            Invoke-WebRequest -Uri $lib.url -OutFile "$($lib.name).zip" -UserAgent "Mozilla/5.0"
            Expand-Archive -Path "$($lib.name).zip" -DestinationPath "$($lib.name)" -Force
          }

      - name: Copy headers, libs and DLLs
        shell: pwsh
        run: |
          # bass
          Copy-Item bass\bass.h         -Destination .
          Copy-Item bass\x64\bass.lib   -Destination .
          Copy-Item bass\x64\bass.dll   -Destination .

          # bass_fx
          Copy-Item bass_fx\bass_fx.h        -Destination .
          Copy-Item bass_fx\x64\bass_fx.lib  -Destination .
          Copy-Item bass_fx\x64\bass_fx.dll  -Destination .

          # bassenc
          Copy-Item bassenc\bassenc.h        -Destination .
          Copy-Item bassenc\x64\bassenc.lib  -Destination .
          Copy-Item bassenc\x64\bassenc.dll  -Destination .

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build
        shell: cmd
        run: |
          cl /O2 /W3 player.c /link ^
            bass.lib bass_fx.lib bassenc.lib ^
            comctl32.lib comdlg32.lib user32.lib gdi32.lib ^
            /SUBSYSTEM:WINDOWS /OUT:BASSPlayer.exe

      - name: Stage release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release | Out-Null
          Copy-Item BASSPlayer.exe, bass.dll, bass_fx.dll, bassenc.dll -Destination release\

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: BASSPlayer-x64
          path: release\

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/BASSPlayer.exe
            release/bass.dll
            release/bass_fx.dll
            release/bassenc.dll
          generate_release_notes: true
